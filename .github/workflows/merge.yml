name: Update Merged Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */3 * * *' # Run slightly after the source feeds
    - cron: '15 13 * * *' # Morning Livewire pass: 8:15 AM Central during daylight time
    - cron: '15 15 * * *' # Morning Livewire retry: 10:15 AM Central during daylight time

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run merge
        run: python merge_events.py
      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/events.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update merged events JSON"
            git push
          fi
